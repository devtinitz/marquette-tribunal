<!DOCTYPE html>

<html lang="fr"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "secondary-fixed-dim": "#ffb86f",
              "outline-variant": "#becab6",
              "on-error-container": "#93000a",
              "on-tertiary-fixed-variant": "#2a4386",
              "surface-container-low": "#f3f3f3",
              "surface-container": "#eeeeee",
              "surface-container-lowest": "#ffffff",
              "outline": "#6f7a69",
              "on-tertiary": "#ffffff",
              "primary-fixed-dim": "#72de5e",
              "on-primary-fixed": "#002200",
              "on-surface-variant": "#3f4a3a",
              "surface-variant": "#e2e2e2",
              "on-tertiary-container": "#eff0ff",
              "surface": "#f9f9f9",
              "primary-container": "#008000",
              "on-secondary": "#ffffff",
              "secondary-fixed": "#ffdcbd",
              "surface-bright": "#f9f9f9",
              "on-background": "#1a1c1c",
              "inverse-surface": "#2f3131",
              "error-container": "#ffdad6",
              "surface-tint": "#006e00",
              "inverse-primary": "#72de5e",
              "on-tertiary-fixed": "#00174a",
              "on-secondary-fixed": "#2c1600",
              "surface-container-high": "#e8e8e8",
              "on-error": "#ffffff",
              "on-surface": "#1a1c1c",
              "on-primary-fixed-variant": "#005300",
              "on-secondary-fixed-variant": "#693c00",
              "secondary-container": "#fe9800",
              "tertiary-fixed-dim": "#b3c5ff",
              "on-primary-container": "#ccffba",
              "tertiary-container": "#536bb0",
              "tertiary": "#3a5296",
              "tertiary-fixed": "#dbe1ff",
              "error": "#ba1a1a",
              "primary-fixed": "#8dfb77",
              "surface-container-highest": "#e2e2e2",
              "secondary": "#8a5100",
              "primary": "#006400",
              "background": "#f9f9f9",
              "surface-dim": "#dadada",
              "inverse-on-surface": "#f1f1f1",
              "on-primary": "#ffffff",
              "on-secondary-container": "#643900"
            },
            fontFamily: {
              "headline": ["Inter"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.125rem", "lg": "0.25rem", "xl": "0.5rem", "full": "0.75rem"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .glass-header {
            background: rgba(249, 249, 249, 0.8);
            backdrop-filter: blur(12px);
        }
        input:focus {
            outline: none;
            border-color: #006400;
            box-shadow: 0 0 0 2px rgba(0, 100, 0, 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- Top Navigation Bar (Suppressed Shell as per UX goal for transactional screens, but branding retained) -->
<header class="fixed top-0 w-full z-50 glass-header shadow-sm">
<div class="flex justify-between items-center px-6 py-4 w-full">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary" data-icon="account_balance">account_balance</span>
<span class="text-primary font-black text-sm uppercase tracking-widest">TRIBUNAL DE YOPOUGON</span>
</div>
<button class="p-2 rounded-full hover:bg-surface-container transition-colors">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="help_outline">help_outline</span>
</button>
</div>
</header>
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12">
<div class="w-full max-w-md">
<!-- Hero Aesthetic Section -->
<div class="mb-10 text-left">
<h1 class="text-4xl font-bold tracking-tight text-on-surface mb-2">Connexion</h1>
<p class="text-on-surface-variant body-lg leading-relaxed">
                    Accédez à votre espace citoyen sécurisé pour suivre vos dossiers judiciaires.
                </p>
</div>
<!-- Login Form Card -->
<div class="bg-surface-container-lowest rounded-xl p-8 shadow-[0_4px_20px_0_rgba(0,0,0,0.03)] border border-outline-variant/10">
<form class="space-y-6">
<!-- Phone Input -->
<div class="space-y-2">
<label class="block text-sm font-semibold text-on-surface-variant ml-1" for="phone">Numéro de téléphone</label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl" data-icon="phone_iphone">phone_iphone</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface border-none rounded-lg text-on-surface placeholder:text-outline/60 transition-all ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary" id="phone" name="phone" placeholder="01 02 03 04 05" type="tel"/>
</div>
</div>
<!-- OTP Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block text-sm font-semibold text-on-surface-variant" for="otp">Code OTP</label>
<button class="text-xs font-bold text-primary hover:text-primary-container transition-colors" type="button">Renvoyer le code</button>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl" data-icon="lock_open">lock_open</span>
</div>
<input class="block w-full pl-11 pr-4 py-4 bg-surface border-none rounded-lg text-on-surface placeholder:text-outline/60 tracking-[0.2em] font-mono transition-all ring-1 ring-outline-variant/20 focus:ring-2 focus:ring-primary" id="otp" maxlength="6" name="otp" placeholder="Saisissez le code reçu" type="text"/>
</div>
<p class="text-[11px] text-on-surface-variant/70 italic mt-1 px-1">Un code de vérification vous a été envoyé par SMS.</p>
</div>
<!-- Action Button -->
<div class="pt-2">
<button class="w-full bg-primary-container hover:bg-primary text-on-primary font-bold py-4 px-6 rounded-lg transition-all active:scale-[0.98] shadow-md shadow-primary/20 flex justify-center items-center gap-2" type="submit">
                            Se connecter
                            <span class="material-symbols-outlined text-lg" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
<!-- Alternative Link -->
<div class="mt-8 pt-6 border-t border-outline-variant/10 text-center">
<p class="text-on-surface-variant text-sm">
                        Nouveau sur la plateforme ? 
                        <a class="text-primary font-bold ml-1 hover:underline decoration-2 underline-offset-4 transition-all" href="#">Créer un compte</a>
</p>
</div>
</div>
<!-- Aesthetic Footer Note -->
<div class="mt-8 flex items-center justify-center gap-4 px-4 opacity-60">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="verified_user">verified_user</span>
<span class="text-[10px] font-bold uppercase tracking-widest">Portail Sécurisé de l'État</span>
</div>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
</div>
</div>
</main>
<!-- Visual Anchor Background Decoration (Asymmetric modernism) -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-screen bg-gradient-to-l from-surface-container-low to-transparent opacity-50"></div>
<div class="fixed bottom-0 left-0 -z-10 w-64 h-64 bg-primary/5 rounded-full blur-3xl -translate-x-1/2 translate-y-1/2"></div>
</body></html>
